name: Backend CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Nacos backend
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check backend source
        id: source
        shell: bash
        run: |
          if [ ! -f pom.xml ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No pom.xml found in repository root. Push backend source first, then rerun this workflow."
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        if: steps.source.outputs.found == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        if: steps.source.outputs.found == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          MVN="mvn"
          if [ -f ./mvnw ]; then
            chmod +x ./mvnw
            MVN="./mvnw"
          fi

          # Nacos distribution builds normally use the release profile. If your fork removes it,
          # fall back to a normal Maven build so the workflow still gives useful feedback.
          $MVN -B -ntp -Prelease-nacos -DskipTests -Dmaven.test.skip=true clean install || \
          $MVN -B -ntp -DskipTests -Dmaven.test.skip=true clean install

      - name: Collect build artifacts
        if: steps.source.outputs.found == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ci-artifacts

          if [ -d distribution/target ]; then
            find distribution/target -type f \( -name '*.zip' -o -name '*.tar.gz' \) -print -exec cp {} ci-artifacts/ \; || true
          fi

          if [ -d console/target ]; then
            find console/target -maxdepth 1 -type f -name '*.jar' -print -exec cp {} ci-artifacts/ \; || true
          fi

          find . -path '*/target/*.jar' \
            ! -name '*sources.jar' \
            ! -name '*javadoc.jar' \
            ! -name 'original-*' \
            | sort | head -200 > ci-artifacts/jars.txt || true

          ls -lah ci-artifacts

      - name: Upload backend artifacts
        if: steps.source.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: nacos-backend-${{ github.sha }}
          path: ci-artifacts/
          if-no-files-found: warn
          retention-days: 14
